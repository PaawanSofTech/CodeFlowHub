services:
  - type: web
    name: codeflow-api
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: Repos__Root
        value: /app/data/repos
      - key: Jwt__Key
        generateValue: true
      - key: Cors__Origins
        value: https://code-flow-hub.vercel.app